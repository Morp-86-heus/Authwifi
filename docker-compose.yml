version: '3.9'

services:
  postgres:
    image: postgres:16-alpine
    container_name: authwifi-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: authwifi
      POSTGRES_PASSWORD: authwifi
      POSTGRES_DB: authwifi
      PGPORT: 9999
    ports:
      - '9999:9999'
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U authwifi']
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: authwifi-backend
    restart: unless-stopped
    environment:
      DATABASE_URL: postgresql://authwifi:authwifi@postgres:9999/authwifi
      JWT_SECRET: ${JWT_SECRET:-dev-only-secret-change-in-production-1234567890abcdef}
      NODE_ENV: ${NODE_ENV:-development}
      OMADA_CONTROLLER_URL: ${OMADA_CONTROLLER_URL:-}
      OMADA_OMADAC_ID: ${OMADA_OMADAC_ID:-}
      OMADA_OPERATOR_USERNAME: ${OMADA_OPERATOR_USERNAME:-}
      OMADA_OPERATOR_PASSWORD: ${OMADA_OPERATOR_PASSWORD:-}
      BASE_URL: ${BASE_URL:-http://localhost:8000}
      STRIPE_SECRET_KEY: ${STRIPE_SECRET_KEY:-}
      STRIPE_PRICE_STARTER: ${STRIPE_PRICE_STARTER:-}
      STRIPE_PRICE_PRO: ${STRIPE_PRICE_PRO:-}
      STRIPE_PRICE_ENTERPRISE: ${STRIPE_PRICE_ENTERPRISE:-}
      STRIPE_WEBHOOK_SECRET: ${STRIPE_WEBHOOK_SECRET:-}
    ports:
      - '8000:8000'
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - uploads_data:/app/public/uploads

  frontend:
    build:
      context: ./apps/dashboard
      dockerfile: Dockerfile
    container_name: authwifi-frontend
    restart: unless-stopped
    ports:
      - '3000:80'
    depends_on:
      - backend

  redis:
    image: redis:7-alpine
    container_name: authwifi-redis
    restart: unless-stopped
    command: redis-server --appendonly yes
    ports:
      - '6379:6379'
    volumes:
      - redis_data:/data
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 10s
      timeout: 5s
      retries: 5

  rabbitmq:
    image: rabbitmq:3.13-management-alpine
    container_name: authwifi-rabbitmq
    restart: unless-stopped
    environment:
      RABBITMQ_DEFAULT_USER: authwifi
      RABBITMQ_DEFAULT_PASS: authwifi
    ports:
      - '5672:5672'
      - '15672:15672'
    volumes:
      - rabbitmq_data:/var/lib/rabbitmq
    healthcheck:
      test: ['CMD', 'rabbitmq-diagnostics', 'ping']
      interval: 15s
      timeout: 10s
      retries: 5

  survey-scheduler:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: authwifi-survey-scheduler
    restart: unless-stopped
    command: python workers/survey_scheduler.py
    environment:
      DATABASE_URL: postgresql://authwifi:authwifi@postgres:9999/authwifi
      RABBITMQ_URL: amqp://authwifi:authwifi@rabbitmq:5672/
      SCHEDULER_INTERVAL_SECONDS: ${SCHEDULER_INTERVAL_SECONDS:-3600}
      GOOGLE_PLACES_API_KEY: ${GOOGLE_PLACES_API_KEY:-}
    depends_on:
      postgres:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy

  survey-sender:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: authwifi-survey-sender
    restart: unless-stopped
    command: python workers/survey_sender.py
    environment:
      DATABASE_URL: postgresql://authwifi:authwifi@postgres:9999/authwifi
      RABBITMQ_URL: amqp://authwifi:authwifi@rabbitmq:5672/
      JWT_SECRET: ${JWT_SECRET:-dev-only-secret-change-in-production-1234567890abcdef}
      BASE_URL: ${BASE_URL:-http://localhost:8000}
      STRIPE_SECRET_KEY: ${STRIPE_SECRET_KEY:-}
      STRIPE_PRICE_STARTER: ${STRIPE_PRICE_STARTER:-}
      STRIPE_PRICE_PRO: ${STRIPE_PRICE_PRO:-}
      STRIPE_PRICE_ENTERPRISE: ${STRIPE_PRICE_ENTERPRISE:-}
      STRIPE_WEBHOOK_SECRET: ${STRIPE_WEBHOOK_SECRET:-}
      SENDGRID_API_KEY: ${SENDGRID_API_KEY:-}
      SENDGRID_FROM_EMAIL: ${SENDGRID_FROM_EMAIL:-noreply@authwifi.it}
      SENDGRID_FROM_NAME: ${SENDGRID_FROM_NAME:-Authwifi}
      GOOGLE_PLACES_API_KEY: ${GOOGLE_PLACES_API_KEY:-}
    depends_on:
      postgres:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy

  campaign-sender:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: authwifi-campaign-sender
    restart: unless-stopped
    command: python workers/campaign_sender.py
    environment:
      DATABASE_URL: postgresql://authwifi:authwifi@postgres:9999/authwifi
      BASE_URL: ${BASE_URL:-http://localhost:8000}
      STRIPE_SECRET_KEY: ${STRIPE_SECRET_KEY:-}
      STRIPE_PRICE_STARTER: ${STRIPE_PRICE_STARTER:-}
      STRIPE_PRICE_PRO: ${STRIPE_PRICE_PRO:-}
      STRIPE_PRICE_ENTERPRISE: ${STRIPE_PRICE_ENTERPRISE:-}
      STRIPE_WEBHOOK_SECRET: ${STRIPE_WEBHOOK_SECRET:-}
      CAMPAIGN_POLL_INTERVAL: ${CAMPAIGN_POLL_INTERVAL:-30}
      ENCRYPTION_KEY: ${ENCRYPTION_KEY}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

volumes:
  postgres_data:
  redis_data:
  rabbitmq_data:
  uploads_data:
